# LGTM Test Dispatcher — runs tests on any branch via workflow_dispatch
# Generated by LGTM Dashboard (https://lgtm.alethiaintel.com)
# Safe: no push/PR triggers, no deploy steps — only runs tests.
name: LGTM Test Dispatcher

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to check out and test'
        required: true
        type: string
      run_id:
        description: 'LGTM run ID for tracking'
        required: false
        type: string
      suite_ids:
        description: 'JSON array of suite IDs to run'
        required: false
        type: string
      test_command:
        description: 'Explicit test command to run (overrides auto-detection)'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Detect project structure
        id: detect
        run: |
          # Find the project root — look for common dependency files
          # In monorepos, prefer dirs with lock files + test deps over bare package.json
          find_project_dir() {
            # Check root first
            if [ -f "package.json" ] || [ -f "pyproject.toml" ] || [ -f "go.mod" ] || [ -f "Cargo.toml" ] || [ -f "pom.xml" ]; then
              echo "."
              return
            fi

            # For subdirs, score them: lock file = +2, test deps = +2, package.json = +1
            best_dir=""
            best_score=0
            for dir in */ */*/; do
              [ -d "$dir" ] || continue
              score=0

              if [ -f "$dir/package.json" ]; then
                score=$((score + 1))
                # Has lock file? (real installable project)
                if [ -f "$dir/package-lock.json" ] || [ -f "$dir/yarn.lock" ] || [ -f "$dir/pnpm-lock.yaml" ] || [ -f "$dir/bun.lockb" ] || [ -f "$dir/bun.lock" ]; then
                  score=$((score + 2))
                fi
                # Has test dependencies?
                if grep -qE '"(jest|vitest|mocha|@testing-library|cypress|playwright)"' "$dir/package.json" 2>/dev/null; then
                  score=$((score + 2))
                fi
              elif [ -f "$dir/pyproject.toml" ] || [ -f "$dir/requirements.txt" ] || [ -f "$dir/go.mod" ] || [ -f "$dir/Cargo.toml" ] || [ -f "$dir/pom.xml" ]; then
                score=$((score + 1))
              fi

              if [ "$score" -gt "$best_score" ]; then
                best_score=$score
                best_dir="${dir%/}"
              fi
            done

            echo "${best_dir:-.}"
          }

          PROJECT_DIR=$(find_project_dir)
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found project directory: $PROJECT_DIR"

          # Detect language and test framework
          LANG="unknown"
          FRAMEWORK="unknown"

          if [ -f "$PROJECT_DIR/package.json" ]; then
            LANG="node"
            if grep -q '"vitest"' "$PROJECT_DIR/package.json"; then
              FRAMEWORK="vitest"
            elif grep -q '"jest"' "$PROJECT_DIR/package.json"; then
              FRAMEWORK="jest"
            elif grep -q '"mocha"' "$PROJECT_DIR/package.json"; then
              FRAMEWORK="mocha"
            else
              FRAMEWORK="vitest"
            fi

            # Detect package manager
            if [ -f "$PROJECT_DIR/bun.lockb" ] || [ -f "$PROJECT_DIR/bun.lock" ]; then
              echo "pkg_manager=bun" >> "$GITHUB_OUTPUT"
            elif [ -f "$PROJECT_DIR/pnpm-lock.yaml" ]; then
              echo "pkg_manager=pnpm" >> "$GITHUB_OUTPUT"
            elif [ -f "$PROJECT_DIR/yarn.lock" ]; then
              echo "pkg_manager=yarn" >> "$GITHUB_OUTPUT"
            else
              echo "pkg_manager=npm" >> "$GITHUB_OUTPUT"
            fi
          elif [ -f "$PROJECT_DIR/pyproject.toml" ] || [ -f "$PROJECT_DIR/requirements.txt" ]; then
            LANG="python"
            FRAMEWORK="pytest"
          elif [ -f "$PROJECT_DIR/go.mod" ]; then
            LANG="go"
            FRAMEWORK="go-test"
          elif [ -f "$PROJECT_DIR/Cargo.toml" ]; then
            LANG="rust"
            FRAMEWORK="cargo-test"
          elif [ -f "$PROJECT_DIR/pom.xml" ] || [ -f "$PROJECT_DIR/build.gradle" ]; then
            LANG="java"
            FRAMEWORK="junit"
          fi

          echo "lang=$LANG" >> "$GITHUB_OUTPUT"
          echo "framework=$FRAMEWORK" >> "$GITHUB_OUTPUT"
          echo "Detected: lang=$LANG framework=$FRAMEWORK pkg_manager=$(cat "$GITHUB_OUTPUT" | grep pkg_manager | cut -d= -f2)"

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.lang == 'node'
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.lang == 'python'
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        if: steps.detect.outputs.lang == 'go'
        with:
          go-version: '1.22'

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: steps.detect.outputs.lang == 'rust'

      - uses: actions/setup-java@v4
        if: steps.detect.outputs.lang == 'java'
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          case "${{ steps.detect.outputs.lang }}" in
            node)
              case "${{ steps.detect.outputs.pkg_manager }}" in
                bun)   npx bun install --frozen-lockfile ;;
                pnpm)  npx pnpm install --frozen-lockfile ;;
                yarn)  yarn install --frozen-lockfile ;;
                *)     npm ci ;;
              esac
              ;;
            python)
              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
              if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
              if [ -f pyproject.toml ]; then pip install -e ".[test]" 2>/dev/null || pip install -e . 2>/dev/null || true; fi
              ;;
            go)      go mod download ;;
            rust)    cargo fetch ;;
            java)    echo "Dependencies will be fetched during test run" ;;
          esac

      - name: Run tests
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          TEST_CMD="${{ inputs.test_command }}"
          if [ -n "$TEST_CMD" ]; then
            echo "Running explicit test command: $TEST_CMD"
            # Ensure JSON output for LGTM artifact parsing
            # || true: don't fail the step on coverage threshold violations — LGTM reads results from the artifact
            if echo "$TEST_CMD" | grep -qE "jest|vitest"; then
              # If command already has -- (npm run ... -- args), append flags directly
              # Otherwise add -- to separate flags
              if echo "$TEST_CMD" | grep -q " -- "; then
                $TEST_CMD --json --outputFile=test-results.json 2>&1 || true
              else
                $TEST_CMD -- --json --outputFile=test-results.json 2>&1 || true
              fi
            else
              $TEST_CMD 2>&1 || true
            fi
          else
            case "${{ steps.detect.outputs.framework }}" in
              vitest)     npx vitest run --reporter=json --outputFile=test-results.json ;;
              jest)       npx jest --json --outputFile=test-results.json ;;
              mocha)      npx mocha --reporter json > test-results.json ;;
              pytest)     pytest --junitxml=test-results.xml ;;
              go-test)    go test -v -json ./... > test-results.json ;;
              cargo-test) cargo test -- -Z unstable-options --format json > test-results.json ;;
              junit)      mvn test -B ;;
              *)          echo "Unknown framework, trying npm test"; npm test ;;
            esac
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lgtm-results
          path: |
            ${{ steps.detect.outputs.project_dir }}/test-results.json
            ${{ steps.detect.outputs.project_dir }}/test-results.xml
            ${{ steps.detect.outputs.project_dir }}/target/surefire-reports/*.xml
          retention-days: 30
